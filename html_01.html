<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Semantic Tag 기초 예제</title>

  <!-- 아래 부분은 화면의 스타일을 지정하는 코드입니다. -->
  <!-- 현재는 정확하게 이해하지 않아도 괜찮습니다. -->
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      line-height: 1.5;
    }
    header, nav, section, article, aside, footer {
      padding: 16px;
      border: 1px solid #ddd;
      margin: 8px;
    }
    .layout {
      display: flex;
      gap: 8px;
      margin: 8px;
    }
    main {
      flex: 3;
      border: 1px solid #bbb;
      margin: 8px;
      padding: 8px;
    }
    aside {
      flex: 1;
    }
    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      gap: 12px;
      margin: 0;
    }
  </style>

</head>
<body>
  <header>
    <h1>이것은 헤더의 제목입니다.</h1>
    <p>이것은 헤더의 본문입니다.</p>
  </header>

  <nav>
    <ul>
      <li><a href="#">홈</a></li>
      <li><a href="#">소개</a></li>
      <li><a href="#">문의</a></li>
    </ul>
  </nav>

  <div class="layout">
    <main>
      <section>
        <h2>공지 섹션</h2>
        <article>
          <h3>공지사항 1</h3>
          <p>article은 독립적으로 의미가 있는 콘텐츠 단위입니다.</p>
        </article>
        <article>
          <h3>공지사항 2</h3>
          <p>블로그 글, 뉴스 기사, 게시글 등에 자주 사용됩니다.</p>
        </article>
      </section>
    </main>

    <aside>
      <h2>사이드바</h2>
      <p>관련 링크, 광고, 프로필 정보 등 보조 콘텐츠</p>
    </aside>
  </div>

  <footer>
    <p>푸터 영역: 저작권, 연락처, 정책 링크 등</p>
  </footer>
</body>
</html>
