<!DOCTYPE html>
<!-- 이 문서가 HTML5 표준에 의해 작성되었음을 브라우저에게 알립니다 -->

<html lang="ko">

<head>
    <meta charset="UTF-8">
    <!-- 한글이나 다른 언어가 깨지지 않도록 인코딩 방식을 지정합니다 -->
    <title>웹 초급트랙 | HTML 기초</title>
    <!-- 브라우저의 탭바에 보이는 페이지명을 지정합니다 -->
</head>

<body>
    <!-- 사용자 눈에 실제로 보이는 콘텐츠를 담는 영역입니다 -->

    <!-- 구역을 나누는 태그들 -->
    <div>div 태그는 구역을 나누는 추상적인 역할을 합니다.</div>
    <div>
		    <br>br은 줄바꿈 태그입니다 
        <p>p는 문단태그입니다.</p>
        <p>문단 사이에는 자동으로 줄바꿈됩니다.</p>
        <div>
            <ul>
                <li> bullet point!1 </li>
                <li> bullet point!2 </li>
            </ul>

            <!-- 구역 내 콘텐츠 태그들 -->
            <h1>h1은 제목</h1>
            <h2>h2는 소제목</h2>
            <h3>h3~h6으로 갈수록 글씨가 작아집니다.</h3>
            <hr>
            구분선 태그는 종료 태그가 따로 없는 empty 태그입니다.
            <hr>
            span 태그는 요소 안에서 특정 <span style="color:red">글자</span>를 꾸밀 때 쓸 수 있습니다.
            <hr>
            a 태그: <a href="https://poolc.org/"> 하이퍼링크 </a>
            <hr>
            img 태그: <img src="https://poolc.org/assets/main-banner-DAW2HCpy.png" width="80%" />
            <hr>
            input 태그: <input type="text" />
            <hr>
            button 태그: <button>버튼</button>
            <hr>
            textarea 태그: <textarea>여러 줄을 입력할 수 있습니다.</textarea>
        </div>
    </div>
</body>

</html>
